<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>llm-debate</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header>
  <h1>llm-debate</h1>
  <nav role="tablist" aria-label="views">
    <button id="tab-chat" class="tab active" role="tab" aria-selected="true">Chat</button>
    <button id="tab-observe" class="tab" role="tab" aria-selected="false">Observe <span id="running-pill" class="pill hidden" role="status" aria-label="a debate is running">●</span></button>
  </nav>
</header>
<main>
  <aside class="panel" id="sidebar">
    <h2>Experiments</h2>
    <button id="new-debate">＋ New debate</button>
    <div id="sidebar-runs"></div>
  </aside>

  <section id="view-chat" class="panel view">
    <div id="chat-messages" aria-live="polite"></div>
    <div id="chat-compose">
      <div id="compose-note" class="hidden"></div>
      <textarea id="chat-input" aria-label="debate prompt" placeholder="Ask anything — two blind models will debate it…"></textarea>
      <div id="chat-controls">
        <label>cap <input id="opt-cap" type="number" value="5" min="1" max="10"></label>
        <label>condition <select id="opt-condition"><option>natural</option><option>steered</option></select></label>
        <label>A · claude <input id="opt-model-a" list="claude-models" placeholder="CLI default" title="model for seat A (claude CLI) — type any model id"></label>
        <label>B · codex <input id="opt-model-b" list="codex-models" placeholder="CLI default" title="model for seat B (codex CLI) — type any model id"></label>
        <datalist id="claude-models">
          <option value="claude-opus-4-8"></option>
          <option value="claude-sonnet-4-6"></option>
          <option value="claude-fable-5"></option>
        </datalist>
        <datalist id="codex-models">
          <option value="gpt-5.6-sol"></option>
          <option value="gpt-5.5"></option>
          <option value="o3"></option>
        </datalist>
        <label>judge <select id="opt-judge" title="who referees (never revealed to the debaters) — CLI family and pinned model in one pick">
          <option value="claude:">claude · CLI default</option>
          <option value="claude:claude-opus-4-8">claude · opus-4-8</option>
          <option value="claude:claude-sonnet-4-6">claude · sonnet-4-6</option>
          <option value="codex:">codex · CLI default</option>
          <option value="codex:gpt-5.5">codex · gpt-5.5</option>
        </select></label>
        <button id="chat-send">Debate</button>
      </div>
    </div>
  </section>

  <section id="view-observe" class="panel view hidden">
    <div id="observe-context"></div>
    <div id="observe-diagram"></div>
    <div id="cards">
      <div class="card" id="card-A"><h3>Participant A <span class="state">idle</span></h3><p></p></div>
      <div class="card" id="card-B"><h3>Participant B <span class="state">idle</span></h3><p></p></div>
      <div class="card" id="card-J"><h3>Judge (invisible) <span class="state">idle</span></h3><p></p></div>
    </div>
    <div id="observe-gauge"><div class="bar"><div id="observe-gauge-fill"></div></div><div id="observe-gauge-label">convergence: –</div></div>
    <div id="observe-answer" class="hidden"></div>
    <div id="observe-feed" aria-live="polite"></div>
  </section>
</main>
<script src="/static/app.js"></script>
</body>
</html>
